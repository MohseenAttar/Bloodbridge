{% extends "base.html" %} {% block content %}
<div class="bg-gradient-to-br from-gray-50 to-white py-12">
  <div class="max-w-2xl mx-auto px-4 sm:px-6 lg:px-8">
    <!-- Header -->
    <div class="text-center mb-8">
      <div
        class="inline-flex items-center justify-center w-20 h-20 bg-purple-100 rounded-full mb-4"
      >
        <i class="fas fa-building text-purple-600 text-3xl"></i>
      </div>
      <h1 class="text-3xl font-bold text-gray-900">
        Register as a <span class="text-purple-600">Blood Bank</span>
      </h1>
      <p class="text-gray-500 mt-2">
        Manage blood inventory and organize donation drives
      </p>
    </div>

    <!-- Registration Form -->
    <div class="bg-white rounded-2xl shadow-xl overflow-hidden">
      <div class="bg-gradient-to-r from-purple-600 to-purple-700 px-6 py-4">
        <h2 class="text-xl font-bold text-white">Blood Bank Information</h2>
        <p class="text-purple-100 text-sm">
          Please fill out all required fields
        </p>
      </div>

      <form method="POST" class="p-6 space-y-5">
        <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
          <div>
            <label class="block text-sm font-semibold text-gray-700 mb-1">
              <i class="fas fa-envelope text-purple-500 mr-1"></i>Email
            </label>
            <input
              type="email"
              name="email"
              required
              class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-purple-500 focus:border-purple-500"
            />
          </div>
          <div>
            <label class="block text-sm font-semibold text-gray-700 mb-1">
              <i class="fas fa-lock text-purple-500 mr-1"></i>Password
            </label>
            <input
              type="password"
              name="password"
              required
              class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-purple-500 focus:border-purple-500"
            />
          </div>
          <div>
            <label class="block text-sm font-semibold text-gray-700 mb-1">
              <i class="fas fa-user text-purple-500 mr-1"></i>Contact Person
              First Name
            </label>
            <input
              type="text"
              name="first_name"
              required
              class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-purple-500 focus:border-purple-500"
            />
          </div>
          <div>
            <label class="block text-sm font-semibold text-gray-700 mb-1">
              <i class="fas fa-user text-purple-500 mr-1"></i>Contact Person
              Last Name
            </label>
            <input
              type="text"
              name="last_name"
              required
              class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-purple-500 focus:border-purple-500"
            />
          </div>
          <div>
            <label class="block text-sm font-semibold text-gray-700 mb-1">
              <i class="fas fa-building text-purple-500 mr-1"></i>Blood Bank
              Name
            </label>
            <input
              type="text"
              name="bank_name"
              required
              class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-purple-500 focus:border-purple-500"
            />
          </div>
          <div>
            <label class="block text-sm font-semibold text-gray-700 mb-1">
              <i class="fas fa-id-card text-purple-500 mr-1"></i>License Number
            </label>
            <input
              type="text"
              name="license_number"
              required
              class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-purple-500 focus:border-purple-500"
            />
          </div>
          <div>
            <label class="block text-sm font-semibold text-gray-700 mb-1">
              <i class="fas fa-phone text-purple-500 mr-1"></i>Phone
            </label>
            <input
              type="tel"
              name="phone"
              class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-purple-500 focus:border-purple-500"
            />
          </div>
          <div>
            <label class="block text-sm font-semibold text-gray-700 mb-1">
              <i class="fas fa-ambulance text-purple-500 mr-1"></i>Emergency
              Contact
            </label>
            <input
              type="text"
              name="emergency_contact"
              class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-purple-500 focus:border-purple-500"
            />
          </div>
          <div class="md:col-span-2">
            <label class="block text-sm font-semibold text-gray-700 mb-1">
              <i class="fas fa-map-marker-alt text-purple-500 mr-1"></i>Blood
              Bank Address
            </label>
            <textarea
              name="address"
              rows="2"
              class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-purple-500"
            ></textarea>
          </div>
        </div>

        <button
          type="submit"
          class="w-full flex justify-center items-center py-3 bg-purple-600 text-white rounded-lg hover:bg-purple-700 transition-all duration-200 font-semibold"
        >
          <i class="fas fa-building mr-2"></i>Register as Blood Bank
        </button>
      </form>
    </div>

    <p class="text-center text-gray-500 text-sm mt-6">
      Already have an account?
      <a
        href="{{ url_for('auth.login') }}"
        class="text-purple-600 hover:text-purple-700"
        >Sign In</a
      >
    </p>
  </div>
</div>
{% endblock %}
