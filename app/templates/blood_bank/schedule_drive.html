{% extends "base.html" %} {% block title %}Schedule Blood Drive{% endblock %} {%
block content %}
<div class="bg-gradient-to-br from-gray-50 to-white py-12">
  <div class="max-w-3xl mx-auto px-4 sm:px-6 lg:px-8">
    <div class="mb-8">
      <div class="flex items-center space-x-3">
        <a
          href="{{ url_for('blood_bank.dashboard') }}"
          class="text-gray-500 hover:text-gray-700"
        >
          <i class="fas fa-arrow-left text-xl"></i>
        </a>
        <div>
          <h1 class="text-3xl font-bold text-gray-900">
            Schedule <span class="text-purple-600">Blood Drive</span>
          </h1>
          <p class="text-gray-500 mt-1">Organize a new blood donation drive</p>
        </div>
      </div>
      <div class="mt-4 h-1 w-20 bg-purple-600 rounded-full"></div>
    </div>

    <div class="bg-white rounded-2xl shadow-xl overflow-hidden">
      <div class="bg-gradient-to-r from-purple-600 to-purple-700 px-6 py-4">
        <h2 class="text-xl font-bold text-white">
          <i class="fas fa-calendar-plus mr-2"></i>Drive Details
        </h2>
        <p class="text-purple-100 text-sm">Fill out all required fields</p>
      </div>

      <form method="POST" class="p-6 space-y-5">
        <div>
          <label class="block text-sm font-semibold text-gray-700 mb-1">
            <i class="fas fa-heading text-purple-500 mr-1"></i>Drive Title
            <span class="text-red-500">*</span>
          </label>
          <input
            type="text"
            name="title"
            required
            class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-purple-500"
          />
        </div>

        <div>
          <label class="block text-sm font-semibold text-gray-700 mb-1">
            <i class="fas fa-map-marker-alt text-purple-500 mr-1"></i>Location
            <span class="text-red-500">*</span>
          </label>
          <input
            type="text"
            name="location"
            required
            class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-purple-500"
          />
        </div>

        <div>
          <label class="block text-sm font-semibold text-gray-700 mb-1">
            <i class="fas fa-align-left text-purple-500 mr-1"></i>Description
          </label>
          <textarea
            name="description"
            rows="3"
            class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-purple-500"
          ></textarea>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
          <div>
            <label class="block text-sm font-semibold text-gray-700 mb-1">
              <i class="fas fa-calendar-day text-purple-500 mr-1"></i>Start Date
              & Time <span class="text-red-500">*</span>
            </label>
            <input
              type="datetime-local"
              name="start_date"
              required
              class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-purple-500"
            />
          </div>
          <div>
            <label class="block text-sm font-semibold text-gray-700 mb-1">
              <i class="fas fa-calendar-day text-purple-500 mr-1"></i>End Date &
              Time <span class="text-red-500">*</span>
            </label>
            <input
              type="datetime-local"
              name="end_date"
              required
              class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-purple-500"
            />
          </div>
        </div>

        <div class="bg-purple-50 rounded-lg p-4 border-l-4 border-purple-500">
          <div class="flex items-start">
            <i class="fas fa-info-circle text-purple-500 mt-0.5 mr-3"></i>
            <div class="text-sm text-purple-800">
              <p class="font-semibold mb-1">Note:</p>
              <p>
                Scheduled blood drives will be visible to donors immediately.
              </p>
            </div>
          </div>
        </div>

        <div class="flex justify-end space-x-3 pt-4">
          <a
            href="{{ url_for('blood_bank.dashboard') }}"
            class="px-5 py-2 border border-gray-300 rounded-lg text-gray-700 hover:bg-gray-50"
          >
            Cancel
          </a>
          <button
            type="submit"
            class="px-5 py-2 bg-purple-600 text-white rounded-lg hover:bg-purple-700 font-semibold"
          >
            <i class="fas fa-calendar-check mr-2"></i>Schedule Drive
          </button>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}
